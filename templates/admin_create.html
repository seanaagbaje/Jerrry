{% extends "dashboard_base.html" %}
{% block title %}Create Admin | ProActive{% endblock %}

{% block content %}
<div class="mx-auto max-w-6xl">
    <div class="mb-6">
        <a href="/admin/dashboard" class="text-sm text-primary hover:underline">&larr; Back to Dashboard</a>
    </div>

    <div
        class="max-w-md mx-auto bg-white dark:bg-gray-900 p-8 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm">
        <h1 class="text-2xl font-bold mb-2">Create Admin Account</h1>
        <p class="text-gray-500 text-sm mb-6">New admins can log in immediately after creation.</p>

        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form action="/admin/create-admin" method="post" class="space-y-4">
            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500" for="email">Email
                    Address</label>
                <input id="email" name="email" type="email" required
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-primary py-3 px-4"
                    placeholder="admin@example.com" />
            </div>
            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500"
                    for="password">Password</label>
                <input id="password" name="password" type="password" required minlength="8"
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-primary py-3 px-4"
                    placeholder="Min 8 characters" />
                <p class="text-xs text-gray-400">Minimum 8 characters</p>
            </div>
            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500"
                    for="department">Department (optional)</label>
                <input id="department" name="department" type="text"
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-primary py-3 px-4"
                    placeholder="e.g. Computer Science" />
            </div>
            <button type="submit"
                class="w-full bg-primary text-white px-6 py-3 rounded-lg font-bold text-sm hover:bg-blue-700 transition">
                Create Admin Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
